<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#fa6404" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Cia Fitness</title>
    <meta name="description" content="Sistema da Academia Cia Fitness" />
    <meta name="author" content="Cia Fitness" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Cia Fitness" />
    <meta property="og:description" content="Sistema da Academia Cia Fitness" />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Script para forçar a remoção de Service Workers antigos e problemáticos.
      // Isso garante que o navegador não fique preso em um cache com defeito.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          if (registrations.length > 0) {
            console.log('Removendo Service Workers antigos...');
            for(let registration of registrations) {
              registration.unregister();
            }
            // Recarrega a página uma vez para garantir que tudo seja carregado sem o SW antigo.
            window.location.reload();
          } else {
            // Se não houver SW antigo, registra o novo normalmente.
            window.addEventListener('load', () => {
              navigator.serviceWorker.register('/sw.js').catch(error => {
                console.log('Falha no registro do ServiceWorker: ', error);
              });
            });
          }
        });
      }
    </script>
  </body>
</html>
